<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Registration | StockMaster Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 1. Design Tokens: Χρήση πράσινου τόνου για την εγγραφή (θετική ενέργεια) */
        :root {
            --brand-success: #10b981;
            --brand-hover: #059669;
            --bg-soft: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body.dark-mode {
            --bg-soft: #0f172a;
            --card-bg: #1e293b;
            --text-dark: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-soft);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background 0.3s ease;
        }

        /* 2. UI/UX: Center Card with smooth shadow */
        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .icon-header {
            font-size: 2.5rem;
            color: var(--brand-success);
            margin-bottom: 15px;
        }

        h2 {
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        /* 3. Form Styling */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .input-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-box i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 42px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            background: transparent;
            color: var(--text-dark);
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--brand-success);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        /* 4. Feedback Logic */
        .alert-error {
            background: #fef2f2;
            color: #ef4444;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border: 1px solid #fee2e2;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--brand-success);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--brand-hover);
            transform: translateY(-1px);
        }

        .footer-link {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--brand-success);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-header">
            <i class="fas fa-user-plus"></i>
        </div>
        <h2>Create account</h2>
        <p class="subtitle">Start managing your warehouse</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert-error">
                  <i class="fas fa-exclamation-circle"></i>
                  {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="form-group">
                <label>Username</label>
                <div class="input-box">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="e.g. John_99" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="At least 6 characters" required>
                </div>
            </div>
            
            <button type="submit">
                Complete Registration
            </button>
        </form>

        <div class="footer-link">
            Already have accesss; <a href="/login">Login</a>
        </div>
    </div>

    <script>
        /* 5. Theme Persistence: Διατήρηση Night Mode */
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
        }
    </script>
</body>
</html>
